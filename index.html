<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1724" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bills" />
  <title>Bill Tracker</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1724;
      --surface: #141f35;
      --surface2: #1a2744;
      --border: #1e2d4a;
      --border2: #2a3f6f;
      --text: #e8edf5;
      --muted: #4a6fa5;
      --green: #22c55e;
      --green-light: #4ade80;
      --green-dark: #166534;
      --green-bg: #0d1f0f;
      --amber: #f59e0b;
      --blue: #1d4ed8;
      --red: #ef4444;
      --purple: #7c3aed;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: 60px;
    }

    #header {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 20px) 20px 20px;
    }

    #app-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #month-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    #month-label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      flex: 1;
      text-align: center;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #sync-btn {
      font-size: 16px;
      color: var(--muted);
    }

    #summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }

    .summary-card .s-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .summary-card .s-value { font-size: 16px; font-weight: 700; }

    #progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    #progress-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #16a34a);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    #bill-list { padding: 16px 16px 0; }

    .category-group { margin-bottom: 18px; }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px 8px;
    }

    .category-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .category-subtotal {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    #empty-msg {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
      display: none;
    }

    .bill-card {
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: background 0.2s, border-color 0.2s;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .bill-card.paid {
      background: var(--green-bg);
      border-color: var(--green-dark);
    }

    .bill-row { display: flex; align-items: center; gap: 12px; }

    .check-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 2px solid var(--border2);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.15s;
      font-size: 14px; color: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    .check-btn.checked { background: var(--green); border-color: var(--green); }

    .bill-info { flex: 1; min-width: 0; }

    .bill-name {
      font-size: 15px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .bill-name.paid-text { color: var(--green-light); text-decoration: line-through; opacity: 0.7; }
    .bill-due { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .bill-amount { font-size: 16px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .bill-amount.paid-amount { color: var(--green-light); opacity: 0.6; }
    .bill-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .icon-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-size: 15px; padding: 4px 6px; border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn.del { color: var(--red); }

    .edit-form input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; font-family: inherit;
    }

    .edit-form .row2 { display: flex; gap: 8px; margin-top: 8px; }
    .edit-form .row2 input { flex: 1; }
    .edit-form .btns { display: flex; gap: 8px; margin-top: 10px; }

    .edit-form select,
    #add-form select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      margin-top: 8px;
      -webkit-appearance: none;
      appearance: none;
    }

    /* Add bill form */
    #add-form {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 12px; padding: 16px; margin-bottom: 10px; display: none;
    }

    #add-form.open { display: block; }
    #add-form .form-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }

    #add-form input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; font-family: inherit;
    }

    #add-form .row2 { display: flex; gap: 8px; margin-top: 8px; }
    #add-form .row2 input { flex: 1; }
    #add-form .btns { display: flex; gap: 8px; margin-top: 12px; }

    /* Bottom action buttons */
    #action-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 0;
    }

    #add-trigger, #ai-trigger {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: 1px dashed var(--border2);
      background: transparent;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      color: var(--muted);
    }

    #ai-trigger {
      border-color: #4c1d95;
      color: #a78bfa;
    }

    /* AI Quick Entry modal */
    #ai-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    #ai-overlay.open { display: flex; }

    #ai-sheet {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 500px;
    }

    #ai-sheet h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #ai-sheet p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    #ai-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      resize: none;
      min-height: 80px;
    }

    #ai-result {
      display: none;
      margin-top: 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 14px;
    }

    #ai-result .r-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    #ai-result .r-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
    #ai-result .r-key { color: var(--muted); }
    #ai-result .r-val { font-weight: 600; }

    #ai-status {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
      min-height: 20px;
      text-align: center;
    }

    #ai-btns { display: flex; gap: 8px; margin-top: 12px; }

    .btn-primary {
      flex: 1; background: var(--blue); border: none; border-radius: 8px;
      color: #fff; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    .btn-purple {
      flex: 1; background: var(--purple); border: none; border-radius: 8px;
      color: #fff; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    .btn-ghost {
      flex: 1; background: transparent; border: 1px solid var(--border2);
      border-radius: 8px; color: var(--muted); padding: 10px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <div id="app-label">Bill Tracker</div>
  <div id="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
    <button class="nav-btn" id="sync-btn" onclick="syncFromPreviousMonth()" title="Copy amounts from previous month">⟲</button>
  </div>
  <div id="summary">
    <div class="summary-card">
      <div class="s-label">Total Due</div>
      <div class="s-value" id="s-total" style="color:#4a6fa5">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Paid</div>
      <div class="s-value" id="s-paid" style="color:#22c55e">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Left</div>
      <div class="s-value" id="s-left" style="color:#f59e0b">—</div>
    </div>
  </div>
  <div id="progress-wrap">
    <div id="progress-meta">
      <span id="p-text">0 of 0 paid</span>
      <span id="p-pct">0%</span>
    </div>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>
</div>

<div id="bill-list">
  <div id="empty-msg">No bills yet. Add one below.</div>

  <div id="add-form">
    <div class="form-label">New Bill</div>
    <input id="new-name" type="text" placeholder="Bill name (e.g. Water)" />
    <div class="row2">
      <input id="new-amount" type="number" placeholder="Amount ($)" />
      <input id="new-due" type="number" placeholder="Due day (1–31)" min="1" max="31" />
    </div>
    <select id="new-category"></select>
    <div class="btns">
      <button class="btn-primary" onclick="addBill()">Add Bill</button>
      <button class="btn-ghost" onclick="closeAddForm()">Cancel</button>
    </div>
  </div>

  <div id="action-bar">
    <button id="add-trigger" onclick="openAddForm()">
      <span style="font-size:18px;line-height:1">+</span> Add Bill
    </button>
    <button id="ai-trigger" onclick="openAI()">
      ✦ Quick Entry
    </button>
  </div>
</div>

<!-- AI Quick Entry Sheet -->
<div id="ai-overlay" onclick="handleOverlayClick(event)">
  <div id="ai-sheet">
    <h3>✦ Quick Entry</h3>
    <p>Just tell me what you paid — I'll figure out the rest.</p>
    <textarea id="ai-input" placeholder='e.g. "Paid electric bill today, it was $170" or "Add water bill due on the 8th"'></textarea>
    <div id="ai-result">
      <div class="r-label">Parsed Info</div>
      <div class="r-row"><span class="r-key">Bill</span><span class="r-val" id="r-name">—</span></div>
      <div class="r-row"><span class="r-key">Amount</span><span class="r-val" id="r-amount">—</span></div>
      <div class="r-row"><span class="r-key">Due Day</span><span class="r-val" id="r-due">—</span></div>
      <div class="r-row"><span class="r-key">Category</span><span class="r-val" id="r-category">—</span></div>
      <div class="r-row"><span class="r-key">Action</span><span class="r-val" id="r-action">—</span></div>
    </div>
    <div id="ai-status"></div>
    <div id="ai-btns">
      <button class="btn-purple" onclick="runAI()">Parse It</button>
      <button class="btn-ghost" onclick="closeAI()">Cancel</button>
    </div>
    <div id="ai-confirm-btns" style="display:none; margin-top:8px;">
      <div style="display:flex;gap:8px;">
        <button class="btn-primary" onclick="applyAIResult()">Apply</button>
        <button class="btn-ghost" onclick="resetAI()">Try Again</button>
      </div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'bill-tracker-v1';
  const API_KEY = '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';
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CATEGORIES = ['Housing', 'Credit Cards', 'Utilities', 'Subscriptions', 'Other'];

  let monthOffset = 0;
  let appData = {};
  let aiParsed = null;

  function getMonthKey(offset = 0) {
    const d = new Date();
    d.setMonth(d.getMonth() + offset);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function getMonthLabel(offset = 0) {
    const d = new Date();
    d.setMonth(d.getMonth() + offset);
    return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }

  function ordinal(n) {
    const num = parseInt(n);
    if ([1,21,31].includes(num)) return 'st';
    if ([2,22].includes(num)) return 'nd';
    if ([3,23].includes(num)) return 'rd';
    return 'th';
  }

  function fmt(n) { return n > 0 ? `$${n.toFixed(2)}` : '—'; }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      appData = raw ? JSON.parse(raw) : {};
    } catch { appData = {}; }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    catch(e) { console.error('Save failed', e); }
  }

  function getPrevKey(key) {
    const [y, m] = key.split('-').map(Number);
    const d = new Date(y, m - 2);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function syncFromPreviousMonth() {
    const key = getMonthKey(monthOffset);
    const prevKey = getPrevKey(key);
    const prevBills = appData[prevKey]?.bills;

    if (!prevBills || prevBills.length === 0) {
      alert('No previous month data found to copy from.');
      return;
    }

    if (!confirm(`Copy amounts, due dates, and categories from ${getMonthLabel(monthOffset - 1)}? This won't change which bills are marked paid.`)) return;

    const current = appData[key];

    prevBills.forEach(prevBill => {
      const prevNameLower = prevBill.name.toLowerCase().trim();
      const match = current.bills.find(b => b.name.toLowerCase().trim() === prevNameLower);
      if (match) {
        // Update existing bill's name/amount/due/category, leave paid status untouched
        match.name = prevBill.name;
        match.amount = prevBill.amount;
        match.due = prevBill.due;
        match.category = prevBill.category;
      } else {
        // Bill didn't exist this month yet — add it, unpaid
        current.bills.push({ ...prevBill, id: Date.now() + Math.random() });
      }
    });

    save();
    render();
  }

  function ensureMonth(key) {
    if (!appData[key]) {
      const prevKey = (() => {
        const [y, m] = key.split('-').map(Number);
        const d = new Date(y, m - 2);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      })();
      const srcBills = appData[prevKey]?.bills || [
        { id: 1, name: 'Rent / Mortgage', amount: '', due: '1', category: 'Housing' },
        { id: 2, name: 'Electric', amount: '', due: '15', category: 'Utilities' },
        { id: 3, name: 'Internet', amount: '', due: '20', category: 'Utilities' },
      ];
      appData[key] = { bills: srcBills.map(b => ({...b})), paid: {} };
      save();
    }
  }

  function render() {
    const key = getMonthKey(monthOffset);
    ensureMonth(key);
    const { bills, paid } = appData[key];

    document.getElementById('month-label').textContent = getMonthLabel(monthOffset);

    const totalDue = bills.reduce((s,b) => s + (parseFloat(b.amount)||0), 0);
    const totalPaid = bills.filter(b => paid[b.id]).reduce((s,b) => s + (parseFloat(b.amount)||0), 0);
    const remaining = totalDue - totalPaid;
    const paidCount = bills.filter(b => paid[b.id]).length;

    document.getElementById('s-total').textContent = fmt(totalDue);
    document.getElementById('s-paid').textContent = fmt(totalPaid);
    const leftEl = document.getElementById('s-left');
    leftEl.textContent = fmt(remaining);
    leftEl.style.color = remaining > 0 ? '#f59e0b' : '#22c55e';

    const pct = bills.length > 0 ? Math.round((paidCount / bills.length) * 100) : 0;
    document.getElementById('p-text').textContent = `${paidCount} of ${bills.length} paid`;
    document.getElementById('p-pct').textContent = `${pct}%`;
    document.getElementById('progress-bar').style.width = `${pct}%`;

    document.querySelectorAll('.category-group').forEach(el => el.remove());
    document.getElementById('empty-msg').style.display = bills.length === 0 ? 'block' : 'none';

    const list = document.getElementById('bill-list');
    const addForm = document.getElementById('add-form');

    // Group bills by category, preserving CATEGORIES order, with any unknown categories at the end
    const grouped = {};
    bills.forEach(b => {
      const cat = b.category || 'Other';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(b);
    });

    const orderedCats = [
      ...CATEGORIES.filter(c => grouped[c]),
      ...Object.keys(grouped).filter(c => !CATEGORIES.includes(c)),
    ];

    orderedCats.forEach(cat => {
      const catBills = grouped[cat];
      const catTotal = catBills.reduce((s,b) => s + (parseFloat(b.amount)||0), 0);

      const groupEl = document.createElement('div');
      groupEl.className = 'category-group';

      const headerEl = document.createElement('div');
      headerEl.className = 'category-header';
      headerEl.innerHTML = `
        <span class="category-title">${escHtml(cat)}</span>
        <span class="category-subtotal">${fmt(catTotal)}</span>
      `;
      groupEl.appendChild(headerEl);

      catBills.forEach(bill => {
        const isPaid = !!paid[bill.id];
        const card = document.createElement('div');
        card.className = 'bill-card' + (isPaid ? ' paid' : '');
        card.dataset.id = bill.id;

        card.innerHTML = `
          <div class="bill-row">
            <button class="check-btn ${isPaid ? 'checked' : ''}" onclick="togglePaid(${bill.id})">
              ${isPaid ? '✓' : ''}
            </button>
            <div class="bill-info">
              <div class="bill-name ${isPaid ? 'paid-text' : ''}">${escHtml(bill.name)}</div>
              <div class="bill-due">${bill.due ? `Due: ${bill.due}${ordinal(bill.due)}` : 'No due date'}</div>
            </div>
            <div class="bill-amount ${isPaid ? 'paid-amount' : ''}">
              ${bill.amount ? `$${parseFloat(bill.amount).toFixed(2)}` : '—'}
            </div>
            <div class="bill-actions">
              <button class="icon-btn" onclick="startEdit(${bill.id})" title="Edit">✎</button>
              <button class="icon-btn del" onclick="deleteBill(${bill.id})" title="Delete">✕</button>
            </div>
          </div>
        `;
        groupEl.appendChild(card);
      });

      list.insertBefore(groupEl, addForm);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function changeMonth(dir) {
    monthOffset += dir;
    closeAddForm();
    render();
  }

  function togglePaid(id) {
    const key = getMonthKey(monthOffset);
    appData[key].paid[id] = !appData[key].paid[id];
    save(); render();
  }

  function deleteBill(id) {
    if (!confirm('Delete this bill?')) return;
    const key = getMonthKey(monthOffset);
    appData[key].bills = appData[key].bills.filter(b => b.id !== id);
    delete appData[key].paid[id];
    save(); render();
  }

  function startEdit(id) {
    const key = getMonthKey(monthOffset);
    const bill = appData[key].bills.find(b => b.id === id);
    if (!bill) return;
    const card = document.querySelector(`.bill-card[data-id="${id}"]`);
    const catOptions = CATEGORIES.map(c =>
      `<option value="${escHtml(c)}" ${bill.category === c ? 'selected' : ''}>${escHtml(c)}</option>`
    ).join('');
    card.innerHTML = `
      <div class="edit-form">
        <input id="edit-name-${id}" type="text" value="${escHtml(bill.name)}" placeholder="Bill name" />
        <div class="row2">
          <input id="edit-amount-${id}" type="number" value="${bill.amount}" placeholder="Amount ($)" />
          <input id="edit-due-${id}" type="number" value="${bill.due}" placeholder="Due day" min="1" max="31" />
        </div>
        <select id="edit-category-${id}">${catOptions}</select>
        <div class="btns">
          <button class="btn-primary" onclick="saveEdit(${id})">Save</button>
          <button class="btn-ghost" onclick="render()">Cancel</button>
        </div>
      </div>
    `;
    document.getElementById(`edit-name-${id}`).focus();
  }

  function saveEdit(id) {
    const key = getMonthKey(monthOffset);
    const bill = appData[key].bills.find(b => b.id === id);
    if (!bill) return;
    bill.name = document.getElementById(`edit-name-${id}`).value.trim() || bill.name;
    bill.amount = document.getElementById(`edit-amount-${id}`).value;
    bill.due = document.getElementById(`edit-due-${id}`).value;
    bill.category = document.getElementById(`edit-category-${id}`).value;
    save(); render();
  }

  function openAddForm() {
    document.getElementById('add-form').classList.add('open');
    document.getElementById('add-trigger').style.display = 'none';
    document.getElementById('new-name').value = '';
    document.getElementById('new-amount').value = '';
    document.getElementById('new-due').value = '';
    document.getElementById('new-category').innerHTML = CATEGORIES.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
    document.getElementById('new-name').focus();
  }

  function closeAddForm() {
    document.getElementById('add-form').classList.remove('open');
    document.getElementById('add-trigger').style.display = 'flex';
  }

  function addBill() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) { document.getElementById('new-name').focus(); return; }
    const amount = document.getElementById('new-amount').value;
    const due = document.getElementById('new-due').value;
    const category = document.getElementById('new-category').value || 'Other';
    const key = getMonthKey(monthOffset);
    appData[key].bills.push({ id: Date.now(), name, amount, due, category });
    save(); closeAddForm(); render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('add-form').classList.contains('open')) addBill();
  });

  // ── AI Quick Entry ──────────────────────────────────

  function openAI() {
    document.getElementById('ai-overlay').classList.add('open');
    document.getElementById('ai-input').value = '';
    document.getElementById('ai-result').style.display = 'none';
    document.getElementById('ai-status').textContent = '';
    document.getElementById('ai-btns').style.display = 'flex';
    document.getElementById('ai-confirm-btns').style.display = 'none';
    aiParsed = null;
    setTimeout(() => document.getElementById('ai-input').focus(), 100);
  }

  function closeAI() {
    document.getElementById('ai-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('ai-overlay')) closeAI();
  }

  function resetAI() {
    document.getElementById('ai-result').style.display = 'none';
    document.getElementById('ai-status').textContent = '';
    document.getElementById('ai-btns').style.display = 'flex';
    document.getElementById('ai-confirm-btns').style.display = 'none';
    document.getElementById('ai-input').focus();
    aiParsed = null;
  }

  async function runAI() {
    const text = document.getElementById('ai-input').value.trim();
    if (!text) { document.getElementById('ai-input').focus(); return; }

    const key = getMonthKey(monthOffset);
    const { bills } = appData[key];
    const billNames = bills.map(b => b.name).join(', ');

    const status = document.getElementById('ai-status');
    status.innerHTML = '<span class="spinner"></span> Thinking...';
    document.getElementById('ai-btns').style.display = 'none';

    const systemPrompt = `You are a bill tracking assistant. Extract bill info from the user's message and return ONLY a JSON object with no markdown, no explanation.

Current bills in the tracker: ${billNames || 'none yet'}
Available categories: ${CATEGORIES.join(', ')}

Return this exact JSON shape:
{
  "action": "mark_paid" | "add_new" | "update",
  "name": "bill name (match existing name if possible)",
  "amount": 123.45 or null,
  "due": "day of month as number string like 8" or null,
  "category": "one of the available categories, best guess if new bill",
  "matched_existing": true or false
}

Rules:
- If they say they paid something, action = "mark_paid"
- If it's a new bill not in the list, action = "add_new"  
- If they're updating info on an existing bill, action = "update"
- Match bill names loosely (electric = Electric, rent = Rent / Mortgage)
- For category: Rent/Mortgage = Housing, electric/water/gas/internet = Utilities, phone/streaming/gym/software subscriptions = Subscriptions, any credit card = Credit Cards, anything else = Other
- Only return the JSON object, nothing else`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 200,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      aiParsed = JSON.parse(clean);

      // Show result
      document.getElementById('r-name').textContent = aiParsed.name || '—';
      document.getElementById('r-amount').textContent = aiParsed.amount != null ? `$${parseFloat(aiParsed.amount).toFixed(2)}` : '—';
      document.getElementById('r-due').textContent = aiParsed.due ? `${aiParsed.due}${ordinal(aiParsed.due)} of month` : '—';
      document.getElementById('r-category').textContent = aiParsed.category || 'Other';

      const actionLabels = {
        mark_paid: '✓ Mark as paid',
        add_new: '+ Add new bill',
        update: '✎ Update existing bill'
      };
      document.getElementById('r-action').textContent = actionLabels[aiParsed.action] || aiParsed.action;

      document.getElementById('ai-result').style.display = 'block';
      status.textContent = 'Does this look right?';
      document.getElementById('ai-confirm-btns').style.display = 'block';

    } catch(e) {
      status.textContent = '⚠ Something went wrong. Try again.';
      document.getElementById('ai-btns').style.display = 'flex';
      console.error(e);
    }
  }

  function applyAIResult() {
    if (!aiParsed) return;
    const key = getMonthKey(monthOffset);
    const { bills, paid } = appData[key];

    if (aiParsed.action === 'mark_paid') {
      // Find matching bill
      const match = bills.find(b => b.name.toLowerCase().includes(aiParsed.name.toLowerCase())
        || aiParsed.name.toLowerCase().includes(b.name.toLowerCase().split(' ')[0]));
      if (match) {
        if (aiParsed.amount != null) match.amount = String(aiParsed.amount);
        appData[key].paid[match.id] = true;
      } else {
        // Bill doesn't exist yet — add it and mark paid
        const id = Date.now();
        appData[key].bills.push({ id, name: aiParsed.name, amount: aiParsed.amount != null ? String(aiParsed.amount) : '', due: aiParsed.due || '', category: aiParsed.category || 'Other' });
        appData[key].paid[id] = true;
      }
    } else if (aiParsed.action === 'add_new') {
      const id = Date.now();
      appData[key].bills.push({ id, name: aiParsed.name, amount: aiParsed.amount != null ? String(aiParsed.amount) : '', due: aiParsed.due || '', category: aiParsed.category || 'Other' });
    } else if (aiParsed.action === 'update') {
      const match = bills.find(b => b.name.toLowerCase().includes(aiParsed.name.toLowerCase().split(' ')[0]));
      if (match) {
        if (aiParsed.amount != null) match.amount = String(aiParsed.amount);
        if (aiParsed.due) match.due = aiParsed.due;
        if (aiParsed.category) match.category = aiParsed.category;
      }
    }

    save();
    closeAI();
    render();
  }

  // Init
  load();
  render();
</script>

</body>
</html>
